---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default
  source:
    repoURL: https://helm.cilium.io/
    chart: cilium
    targetRevision: 1.19.1

    destination:
      server: https://kubernetes.default.svc
      namespace: kube-system
    syncPolicy:
      syncOptions:
        - CreateNamespace=true
      managedNamespaceMetadata:
        labels:
          pod-security.kubernetes.io/enforce: privileged
      automated:
        selfHeal: true
        prune: true

    helm:
      valuesObject:
        ipam:
          mode: kubernetes

        kubeProxyReplacement: true

        securityContext:
          capabilities:
            ciliumAgent:
              - CHOWN
              - KILL
              - NET_ADMIN
              - NET_RAW
              - IPC_LOCK
              - SYS_ADMIN
              - SYS_RESOURCE
              - DAC_OVERRIDE
              - FOWNER
              - SETGID
              - SETUID
            cleanCiliumState:
              - NET_ADMIN
              - SYS_ADMIN
              - SYS_RESOURCE

        cgroup:
          autoMount:
            enabled: false
          hostRoot: /sys/fs/cgroup

        k8sServiceHost: localhost
        k8sServicePort: 7445

        bgpControlPlane:
          enabled: true

        gatewayAPI:
          enabled: true
          enableAlpn: true
          enableAppProtocol: true

        ingressController:
          enabled: true
          loadbalancerMode: dedicated
          default: true

        hubble:
          enabled: true
          relay:
            enabled: true
          ui:
            enabled: true
