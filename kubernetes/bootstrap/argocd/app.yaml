apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  # No finalizer — prevents accidental cascade-deletion of ArgoCD's own
  # resources if someone runs `kubectl delete application argocd`.
spec:
  project: default
  source:
    repoURL: https://github.com/mpeterson/homelab
    path: kubernetes/bootstrap/argocd
    targetRevision: main

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  ignoreDifferences:
    - group: ""
      kind: Secret
      name: argocd-secret
      jsonPointers:
        - /data

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      selfHeal: true
      prune: false
