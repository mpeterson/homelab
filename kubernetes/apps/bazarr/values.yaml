# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-3.7.3/charts/library/common/values.schema.json
---
strategy: RollingUpdate

controllers:
  bazarr:
    replicas: 1
    pod:
      securityContext:
        runAsUser: 65534
        runAsGroup: 100
        fsGroup: 65534
        fsGroupChangePolicy: "OnRootMismatch"

    containers:
      app:
        image:
          repository: ghcr.io/home-operations/bazarr
          tag: 1.5.6@sha256:79fc37491f55c7e24427bcd669bce3df2d7415ca432a47ce9d53cc5988af8411
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: &port 6767
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probes
        resources:
          requests:
            cpu: 15m
            memory: 256Mi
          limits:
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

service:
  app:
    controller: bazarr
    ports:
      http:
        port: *port

route:
  app:
    enabled: true
    kind: HTTPRoute
    hostnames:
      - bazarr.lan.peterson.com.ar
    parentRefs:
      - kind: Gateway
        name: internal-gateway
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - name: bazarr
            port: *port
        matches:
          - path:
              type: PathPrefix
              value: /

persistence:
  config:
    storageClass: zfs-generic-iscsi-csi-xfs
    accessMode: ReadWriteOnce
    size: 500Mi
    globalMounts:
      - path: /config
  temp:
    type: emptyDir
    globalMounts:
      - path: /tmp
  nfs-nas-media:
    type: nfs
    server: nas.lan.peterson.com.ar
    path: /nibbler/media/library/
    globalMounts:
      - path: /data/streaming
        subPath: streaming
