# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-3.7.3/charts/library/common/values.schema.json
---
controllers:
  kopia-nas-backup:
    type: cronjob

    cronjob:
      schedule: "0 2 * * *"
      backoffLimit: 0
      timeZone: UTC
      concurrencyPolicy: Forbid
      failedJobsHistory: 3
      successfulJobsHistory: 3

    pod:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0

    containers:
      app:
        image:
          repository: kopia/kopia
          tag: 0.22.3@sha256:4dcc208c1b191770bf4d0854f8deec06b4a16b35be4b63abdcfa9755cee7960e
        command:
          - /bin/sh
          - -c
        args:
          - |
            set -e

            B2_ARGS="--bucket=${KOPIA_B2_BUCKET} --key-id=${B2_KEY_ID} --key=${B2_KEY}"
            CONN_ARGS="--override-hostname=kopia-nas-backup --override-username=cronjob"

            echo "==> Connecting to B2 repository..."
            if ! kopia repository connect b2 ${B2_ARGS} \
              --password="${KOPIA_REPOSITORY_PASSWORD}" ${CONN_ARGS} 2>/dev/null; then
              echo "==> Repository not found, initializing..."
              kopia repository create b2 ${B2_ARGS} \
                --password="${KOPIA_REPOSITORY_PASSWORD}" ${CONN_ARGS}
              kopia policy set --global \
                --keep-daily 7 --keep-weekly 4 --keep-monthly 6 --keep-annual 2
            fi

            echo "==> Backing up memories..."
            kopia snapshot create /data/memories \
              --tags=source:nas,dataset:memories

            echo "==> Backing up paperless..."
            kopia snapshot create /data/paperless \
              --tags=source:nas,dataset:paperless

            echo "==> Running maintenance..."
            kopia maintenance run --full

            echo "==> Backup completed successfully"
            if [ -n "${HEALTHCHECK_URL}" ]; then
              curl -fsS -m 10 --retry 5 "${HEALTHCHECK_URL}" > /dev/null 2>&1 || true
            fi
        envFrom:
          - secretRef:
              name: kopia-nas-backup-secret
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities: {drop: ["ALL"]}

persistence:
  nfs-nas-memories:
    type: nfs
    server: nas.lan.peterson.com.ar
    path: /nibbler/media/memories
    globalMounts:
      - path: /data/memories
        readOnly: true
  nfs-nas-paperless:
    type: nfs
    server: nas.lan.peterson.com.ar
    path: /nibbler/apps/paperless
    globalMounts:
      - path: /data/paperless
        readOnly: true
  kopia-cache:
    type: emptyDir
    sizeLimit: 2Gi
    globalMounts:
      - path: /root/.cache/kopia
  kopia-config:
    type: emptyDir
    globalMounts:
      - path: /root/.config/kopia
  kopia-logs:
    type: emptyDir
    globalMounts:
      - path: /root/.local/share/kopia
