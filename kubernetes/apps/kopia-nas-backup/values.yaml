# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-3.7.3/charts/library/common/values.schema.json
---
controllers:
  kopia-nas-backup:
    type: cronjob

    cronjob:
      schedule: "0 23 * * *"
      backoffLimit: 0
      timeZone: UTC
      concurrencyPolicy: Forbid
      failedJobsHistory: 3
      successfulJobsHistory: 3

    pod:
      securityContext:
        runAsUser: 65534
        runAsGroup: 100
        runAsNonRoot: true
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch

    containers:
      app:
        image:
          repository: ghcr.io/home-operations/kopia
          tag: 0.22.3@sha256:17ab64542280197a5368247deaefadc3e3bbe15714ab666c2455a06824e86efd
        command:
          - /bin/bash
          - /scripts/backup.sh
        envFrom:
          - secretRef:
              name: kopia-nas-backup-secret
        resources:
          requests:
            cpu: 1500m
            memory: 2Gi
          limits:
            memory: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}

persistence:
  nfs-nas-memories:
    type: nfs
    server: nas.lan.peterson.com.ar
    path: /nibbler/media/memories
    globalMounts:
      - path: /data/memories
        readOnly: true
  nfs-nas-paperless:
    type: nfs
    server: nas.lan.peterson.com.ar
    path: /nibbler/apps/paperless
    globalMounts:
      - path: /data/paperless
        readOnly: true
  scripts:
    type: configMap
    name: kopia-nas-backup-scripts
    defaultMode: 0775
    globalMounts:
      - path: /scripts
        readOnly: true
  kopia-cache:
    storageClass: zfs-generic-iscsi-csi-xfs
    accessMode: ReadWriteOnce
    size: 50Gi
    labels:
      velero.io/exclude-from-backup: "true"
    globalMounts:
      - path: /config/cache
  kopia-config:
    type: emptyDir
    globalMounts:
      - path: /config
        subPath: config
  kopia-logs:
    type: emptyDir
    globalMounts:
      - path: /config/logs
