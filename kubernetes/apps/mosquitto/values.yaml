persistence:
  data:
    storageClass: zfs-generic-iscsi-csi-xfs
    accessMode: ReadWriteOnce
    size: 500Mi
    advancedMounts:
      mosquitto:
        app:
          - path: /mosquitto/data
  config:
    type: configMap
    name: mosquitto-configmap
    advancedMounts:
      mosquitto:
        app:
          - path: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf
            readOnly: true
  acl:
    type: configMap
    name: mosquitto-acl
    advancedMounts:
      mosquitto:
        app:
          - path: /mosquitto/external_config/acl
            subPath: acl
            readOnly: true
  logs:
    type: emptyDir
    advancedMounts:
      mosquitto:
        app:
          - path: /mosquitto/log
  passwd:
    type: secret
    name: mosquitto-secret
    advancedMounts:
      mosquitto:
        init-config:
          - path: /tmp/passwd
            subPath: passwd
            readOnly: true
  external-config:
    type: emptyDir
    globalMounts:
      - path: /mosquitto/external_config
