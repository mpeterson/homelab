# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-3.7.3/charts/library/common/values.schema.json
---
strategy: RollingUpdate

controllers:
  mosquitto:
    initContainers:
      init-config:
        image:
          repository: &image docker.io/library/eclipse-mosquitto
          tag: &tag 2.0.22@sha256:914f529386804c8278a4e581526b9be5e1604df44b30daabc70aa97dcefe5268
        command: ["/bin/sh", "-c"]
        args:
          - |
            cp /tmp/passwd /mosquitto/external_config/passwd;
            chmod 0700 /mosquitto/external_config/passwd;
            mosquitto_passwd -U /mosquitto/external_config/passwd
    containers:
      app:
        image:
          repository: *image
          tag: *tag
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}
        resources:
          limits:
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 20Mi

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile: {type: RuntimeDefault}

service:
  app:
    controller: mosquitto
    # TODO(michelp): Temporary until Cilium supports TCPRoute for Gateway API
    type: LoadBalancer
    annotations:
      io.cilium/lb-ipam-ips: 10.3.1.7
    ##
    ports:
      mqtt:
        port: &mqtt-port 1883
      websocket:
        port: &websocket-port 9001

