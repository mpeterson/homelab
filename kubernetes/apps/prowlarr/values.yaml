# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-3.7.3/charts/library/common/values.schema.json
---
strategy: RollingUpdate

controllers:
  prowlarr:
    replicas: 1
    pod:
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: "OnRootMismatch"

    containers:
      app:
        image:
          repository: ghcr.io/home-operations/prowlarr
          tag: 2.3.5.5327@sha256:fc87e9af2f175ef19610fdcf1fcdcc84d5099127211cc6733f826409b2733237
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: &port 9696
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probes
        resources:
          requests:
            cpu: 18m
            memory: 128Mi
          limits:
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

service:
  app:
    controller: prowlarr
    ports:
      http:
        port: *port

route:
  app:
    enabled: true
    kind: HTTPRoute
    hostnames:
      - prowlarr.lan.peterson.com.ar
    parentRefs:
      - kind: Gateway
        name: internal-gateway
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - name: prowlarr
            port: *port
        matches:
          - path:
              type: PathPrefix
              value: /

persistence:
  config:
    storageClass: zfs-generic-iscsi-csi-xfs
    accessMode: ReadWriteOnce
    size: 500Mi
    globalMounts:
      - path: /config
  temp:
    type: emptyDir
    globalMounts:
      - path: /tmp
