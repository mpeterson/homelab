# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-3.7.3/charts/library/common/values.schema.json
---
strategy: RollingUpdate

controllers:
  n8n:
    # annotations:
    #   reloader.stakater.com/auto: "true"

    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"

    containers:
      app:
        image:
          repository: ghcr.io/n8n-io/n8n
          tag: 2.18.2@sha256:e402c9efcadcab279d6f1ed7c42d9eb72109e7a22e90e555504f5c0525cf62e3
        env:
          DB_SQLITE_VACUUM_ON_STARTUP: true
          EXECUTIONS_DATA_PRUNE: true
          EXECUTIONS_DATA_MAX_AGE: 7
          EXECUTIONS_DATA_PRUNE_MAX_COUNT: 50000
          GENERIC_TIMEZONE: "Asia/Jerusalem"
          N8N_EDITOR_BASE_URL: "https://n8n.lan.peterson.com.ar/"
          N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: false
          N8N_PROTOCOL: "https"
          N8N_PORT: &port 8080
          N8N_HOST: &hostName n8n.lan.peterson.com.ar
          N8N_LOG_LEVEL: info
          N8N_LOG_OUTPUT: console
          N8N_ENCRYPTION_KEY:
            valueFrom:
              secretKeyRef:
                name: n8n-secret
                key: N8N_ENCRYPTION_KEY
          WEBHOOK_URL: "https://n8n-webhook.peterson.com.ar/"
        resources:
          requests:
            cpu: 5m
            memory: 128Mi
          limits:
            memory: 2Gi

service:
  app:
    ports:
      http:
        port: *port

persistence:
  data:
    storageClass: zfs-generic-iscsi-csi-xfs
    accessMode: ReadWriteOnce
    size: 5Gi
    advancedMounts:
      n8n:
        app:
          - path: /home/node/.n8n

route:
  app:
    hostnames:
      - *hostName
    parentRefs:
      - name: internal-gateway
        namespace: network
        sectionName: https

  webhooks:
    hostnames:
      - n8n-webhook.peterson.com.ar
    parentRefs:
      - name: public-gateway
        namespace: network
        sectionName: https
    rules:
      - matches:
          - path:
              value: /webhook
        backendRefs: [{}]
