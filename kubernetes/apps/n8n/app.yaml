---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: &app n8n
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: selfhosted

  info:
    - name: Chart
      # renovate: datasource=helm registryUrl=https://bjw-s-labs.github.io/helm-charts depName=app-template
      value: app-template@4.6.2
    - name: Image
      # renovate: datasource=docker depName=ghcr.io/n8n-io/n8n
      value: ghcr.io/n8n-io/n8n:2.21.0@sha256:4b8acf6a9e21ee4234850557b3c1c46b940f4025a8ddb0f697f858b788103ebe

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      selfHeal: true
      prune: true

  source:
    repoURL: https://github.com/mpeterson/homelab
    path: kubernetes/apps/n8n/
    targetRevision: main
