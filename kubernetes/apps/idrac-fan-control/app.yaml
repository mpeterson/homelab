---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idrac-fan-control
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: utilities

  info:
    - name: Chart
      # renovate: datasource=helm registryUrl=https://bjw-s-labs.github.io/helm-charts depName=app-template
      value: app-template@5.0.1
    - name: Image
      # renovate: datasource=docker depName=ghcr.io/tigerblue77/dell_idrac_fan_controller
      value: ghcr.io/tigerblue77/dell_idrac_fan_controller:latest@sha256:d308284e30302d4b8dc8ad2ba15e93576db48275339b394ea390f4d86a698d41

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      selfHeal: true
      prune: true

  source:
    repoURL: https://github.com/mpeterson/homelab
    path: kubernetes/apps/idrac-fan-control/
    targetRevision: main
