# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-3.7.3/charts/library/common/values.schema.json
---
controllers:
  kopia-server:
    replicas: 1

    pod:
      securityContext:
        runAsUser: 65534
        runAsGroup: 100
        runAsNonRoot: true
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch

    initContainers:
      init-repo:
        image:
          repository: ghcr.io/home-operations/kopia
          tag: 0.22.3@sha256:17ab64542280197a5368247deaefadc3e3bbe15714ab666c2455a06824e86efd
        command:
          - /bin/bash
          - /scripts/init-repo.sh
        env:
          - name: KOPIA_PASSWORD
            valueFrom:
              secretKeyRef:
                name: kopia-server-secret
                key: KOPIA_REPOSITORY_PASSWORD
        envFrom:
          - secretRef:
              name: kopia-server-secret

    containers:
      app:
        image:
          repository: ghcr.io/home-operations/kopia
          tag: 0.22.3@sha256:17ab64542280197a5368247deaefadc3e3bbe15714ab666c2455a06824e86efd
        env:
          - name: KOPIA_PASSWORD
            valueFrom:
              secretKeyRef:
                name: kopia-server-secret
                key: KOPIA_REPOSITORY_PASSWORD
        args:
          - --tls-cert-file=/tls/tls.crt
          - --tls-key-file=/tls/tls.key
          - --server-username=$(KOPIA_SERVER_USERNAME)
          - --server-password=$(KOPIA_SERVER_PASSWORD)
          - --server-control-username=$(KOPIA_SERVER_USERNAME)
          - --server-control-password=$(KOPIA_SERVER_PASSWORD)
        envFrom:
          - secretRef:
              name: kopia-server-secret
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - curl -fsSk -u "${KOPIA_SERVER_USERNAME}:${KOPIA_SERVER_PASSWORD}" https://localhost:51515/ > /dev/null
              initialDelaySeconds: 10
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - curl -fsSk -u "${KOPIA_SERVER_USERNAME}:${KOPIA_SERVER_PASSWORD}" https://localhost:51515/ > /dev/null
              initialDelaySeconds: 5
              periodSeconds: 10
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}

  offsite-sync:
    type: cronjob

    cronjob:
      schedule: "0 1 * * *"
      backoffLimit: 0
      timeZone: UTC
      concurrencyPolicy: Forbid
      failedJobsHistory: 3
      successfulJobsHistory: 3

    pod:
      securityContext:
        runAsUser: 65534
        runAsGroup: 100
        runAsNonRoot: true
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch

    containers:
      app:
        image:
          repository: ghcr.io/home-operations/kopia
          tag: 0.22.3@sha256:17ab64542280197a5368247deaefadc3e3bbe15714ab666c2455a06824e86efd
        command:
          - /bin/bash
          - /scripts/sync-offsite.sh
        env:
          - name: KOPIA_PASSWORD
            valueFrom:
              secretKeyRef:
                name: kopia-server-secret
                key: KOPIA_REPOSITORY_PASSWORD
        envFrom:
          - secretRef:
              name: kopia-server-secret
        resources:
          requests:
            cpu: 1500m
            memory: 2Gi
          limits:
            memory: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}

service:
  app:
    controller: kopia-server
    type: LoadBalancer
    loadBalancerIP: 10.3.1.8
    annotations:
      external-dns.alpha.kubernetes.io/hostname: kopia.lan.peterson.com.ar
    ports:
      https:
        port: 443
        targetPort: 51515

persistence:
  tls-cert:
    type: secret
    name: kopia-server-tls
    advancedMounts:
      kopia-server:
        app:
          - path: /tls
            readOnly: true
  nfs-repo:
    type: nfs
    server: nas.lan.peterson.com.ar
    path: /nibbler/apps/kopia-backups
    globalMounts:
      - path: /repo
  scripts:
    type: configMap
    name: kopia-server-scripts
    defaultMode: 0775
    globalMounts:
      - path: /scripts
        readOnly: true
  kopia-cache:
    storageClass: zfs-generic-iscsi-csi-xfs
    accessMode: ReadWriteOnce
    size: 50Gi
    labels:
      velero.io/exclude-from-backup: "true"
    advancedMounts:
      kopia-server:
        app:
          - path: /config/cache
        init-repo:
          - path: /config/cache
  kopia-sync-cache:
    type: emptyDir
    advancedMounts:
      offsite-sync:
        app:
          - path: /config/cache
  kopia-config:
    type: emptyDir
    globalMounts:
      - path: /config
        subPath: config
  kopia-logs:
    type: emptyDir
    globalMounts:
      - path: /config/logs
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
