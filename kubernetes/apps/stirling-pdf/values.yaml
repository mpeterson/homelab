# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-3.7.3/charts/library/common/values.schema.json
---
strategy: RollingUpdate

controllers:
  stirling-pdf:
    replicas: 1
    pod:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"

    containers:
      app:
        image:
          repository: ghcr.io/stirling-tools/s-pdf
          tag: 2.9.0-fat@sha256:82f88f27b700c7d3b79540d67e08fe79d5d4a9c6df7de6130593ecf6b600bca9
        env:
          PUID: "1000"
          PGID: "1000"
          UMASK: "022"
          DOCKER_ENABLE_SECURITY: "true"
          SECURITY_ENABLELOGIN: "true"
          SECURITY_INITIALLOGIN_USERNAME:
            valueFrom:
              secretKeyRef:
                name: stirling-pdf-secret
                key: SECURITY_INITIALLOGIN_USERNAME
          SECURITY_INITIALLOGIN_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: stirling-pdf-secret
                key: SECURITY_INITIALLOGIN_PASSWORD
          SYSTEM_DEFAULTLOCALE: en-US
          SYSTEM_MAXFILESIZE: "999"
          SPRINGDOC_API_DOCS_ENABLED: "false"
          SPRINGDOC_SWAGGER_UI_ENABLED: "false"
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              periodSeconds: 5
        resources:
          requests:
            cpu: 25m
            memory: 512Mi
          limits:
            memory: 4Gi

service:
  app:
    controller: stirling-pdf
    ports:
      http:
        port: &port 8080

route:
  app:
    enabled: true
    kind: HTTPRoute
    hostnames:
      - pdf.peterson.com.ar
    parentRefs:
      - kind: Gateway
        name: public-gateway
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - name: stirling-pdf
            port: *port
        matches:
          - path:
              type: PathPrefix
              value: /

persistence:
  configs:
    storageClass: zfs-generic-iscsi-csi-xfs
    accessMode: ReadWriteOnce
    size: 500Mi
    globalMounts:
      - path: /configs
  tessdata:
    storageClass: zfs-generic-iscsi-csi-xfs
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /usr/share/tessdata
  logs:
    storageClass: zfs-generic-iscsi-csi-xfs
    accessMode: ReadWriteOnce
    size: 500Mi
    globalMounts:
      - path: /logs
  pipeline:
    storageClass: zfs-generic-iscsi-csi-xfs
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /pipeline
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
