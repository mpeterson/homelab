# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-3.7.3/charts/library/common/values.schema.json
---
defaultPodOptions:
  securityContext:
    runAsUser: 65534
    runAsGroup: 100
    fsGroup: 65534
    fsGroupChangePolicy: "OnRootMismatch"

controllers:
  tqm:
    type: cronjob

    cronjob: &cronJobSpec
      schedule: "@hourly"
      backoffLimit: 0
      concurrencyPolicy: Forbid
      failedJobsHistory: 3
      successfulJobsHistory: 3

    pod:
      restartPolicy: Never

    initContainers:
      retag: &container
        image:
          repository: ghcr.io/home-operations/tqm
          tag: 1.19.0@sha256:025ee0c0c8b75f4c7bffa90216eedb494b9884e092a47e9c49824fe63427808c
        args:
          - retag
          - qb
        resources:
          requests:
            memory: 128Mi
            cpu: 25m
          limits:
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

    containers:
      clean:
        <<: *container
        args:
          - clean
          - qb

  orphaned:
    type: cronjob
    cronjob:
      <<: *cronJobSpec
      schedule: "@daily"
    pod:
      restartPolicy: Never
    containers:
      app:
        <<: *container
        args:
          - orphan
          - qb

persistence:
  config:
    type: emptyDir
    globalMounts:
      - path: /.config/tqm
  config-file:
    type: secret
    name: tqm-secret
    globalMounts:
      - path: /.config/tqm/config.yaml
        subPath: config.yaml
        readOnly: true
  downloads:
    type: nfs
    server: nas.lan.peterson.com.ar
    path: /nibbler/media/library/
    globalMounts:
      - path: /data/downloads/torrents
        subPath: downloads/torrents
