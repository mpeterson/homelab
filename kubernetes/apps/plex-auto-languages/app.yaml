---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: &app plex-auto-languages
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: media

  info:
    - name: Chart
      # renovate: datasource=helm registryUrl=https://bjw-s-labs.github.io/helm-charts depName=app-template
      value: app-template@5.0.1
    - name: Image
      # renovate: datasource=docker depName=ghcr.io/journeydocker/plex-auto-languages
      value: ghcr.io/journeydocker/plex-auto-languages:1.5.3@sha256:976ad44607f5b1ad71f7cbc7a785d3b708c4abdb61b07f27b84d0a06f67e9ed0

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      selfHeal: true
      prune: true

  source:
    repoURL: https://github.com/mpeterson/homelab
    path: kubernetes/apps/plex-auto-languages/
    targetRevision: main
