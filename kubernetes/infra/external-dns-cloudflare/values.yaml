---
fullnameOverride: external-dns-cloudflare

image:
  repository: registry.k8s.io/external-dns/external-dns
  tag: v0.21.0@sha256:f53faaf71cb270d1ca9dce6ea0c94bfebf1a18696263487f0fbc74b9bf2bd7ff

provider:
  name: cloudflare

sources:
  - gateway-httproute

domainFilters:
  - peterson.com.ar

excludeDomains:
  - lan.peterson.com.ar

policy: sync
registry: txt
txtOwnerId: homelab-cloudflare
txtPrefix: _edns.

extraArgs:
  - --default-targets=ashton.peterson.com.ar
  - --force-default-targets
  - --gateway-label-filter=external-dns/zone=public

env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: external-dns-cloudflare-secret
        key: api-token

serviceMonitor:
  enabled: true
