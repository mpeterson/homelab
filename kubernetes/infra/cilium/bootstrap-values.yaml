---
# Cilium Helm values for bootstrap installation.
# These values MUST match the valuesObject in app.yaml — ArgoCD takes over management
# after bootstrap, and any drift will cause unnecessary pod restarts.
#
# This file is only used during fresh cluster bootstrap: just bootstrap cilium
# Source of truth for ongoing management: kubernetes/infra/cilium/app.yaml

autoDirectNodeRoutes: true

bandwidthManager:
  bbr: true
  enabled: true

bgpControlPlane:
  enabled: true

bpf:
  datapathMode: netkit
  distributedLRU:
    enabled: false
  mapDynamicSizeRatio: 0.08
  masquerade: true
  preallocateMaps: true

bpfClockProbe: true

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

dashboards:
  annotations:
    grafana_folder: Cilium
  enabled: true

devices: ens18

enableIPv4BIGTCP: true

endpointRoutes:
  enabled: true

envoy:
  enabled: true
  rollOutPods: true

gatewayAPI:
  enableAlpn: true
  enableAppProtocol: true
  enabled: true

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

ingressController:
  default: true
  enabled: true
  loadbalancerMode: dedicated

ipam:
  mode: kubernetes

ipv4NativeRoutingCIDR: 10.244.0.0/16

k8sServiceHost: localhost
k8sServicePort: 7445

kubeProxyReplacement: true

loadBalancer:
  algorithm: maglev
  mode: dsr

localRedirectPolicy: true

operator:
  dashboards:
    annotations:
      grafana_folder: Cilium
    enabled: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
  replicas: 2
  rollOutPods: true

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    trustCRDsExist: true

rollOutCiliumPods: true

routingMode: native

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - PERFMON
      - BPF
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
