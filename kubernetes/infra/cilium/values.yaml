---
# Cilium Helm values — single source of truth.
# Used by both ArgoCD (via multi-source $values ref) and bootstrap (helm install -f).
#
# ArgoCD app: kubernetes/infra/cilium/app.yaml
# Bootstrap:  just bootstrap cilium

autoDirectNodeRoutes: true

bandwidthManager:
  bbr: true
  enabled: true

upgradeCompatibility: "1.17"

bgpControlPlane:
  enabled: true

bpf:
  datapathMode: netkit
  mapDynamicSizeRatio: 0.08
  masquerade: true
  preallocateMaps: true

bpfClockProbe: true

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

dashboards:
  annotations:
    grafana_folder: Cilium
  enabled: true

devices: ens18

enableIPv4BIGTCP: true

endpointRoutes:
  enabled: true

envoy:
  enabled: true
  rollOutPods: true

gatewayAPI:
  enableAlpn: true
  enableAppProtocol: true
  enabled: true

hubble:
  relay:
    enabled: true
  tls:
    auto:
      method: cronJob
  ui:
    enabled: true

ingressController:
  default: true
  enabled: true

ipam:
  mode: kubernetes

ipv4NativeRoutingCIDR: 10.244.0.0/16

k8sServiceHost: localhost
k8sServicePort: 7445

kubeProxyReplacement: true

loadBalancer:
  algorithm: maglev
  mode: dsr

localRedirectPolicies:
  enabled: true

operator:
  dashboards:
    annotations:
      grafana_folder: Cilium
    enabled: true
  prometheus:
    serviceMonitor:
      enabled: true
  rollOutPods: true

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    trustCRDsExist: true

rollOutCiliumPods: true

routingMode: native

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - PERFMON
      - BPF
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
