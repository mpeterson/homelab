---
# Cilium CNI — Helm chart managed by ArgoCD
# Adopts the existing Helm release after orphaning (see .local/plans/491-cilium-self-managed.md)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    syncOptions:
      - ServerSideApply=true
    automated:
      selfHeal: true
      prune: false

  source:
    repoURL: https://helm.cilium.io
    chart: cilium
    # renovate: datasource=helm registryUrl=https://helm.cilium.io depName=cilium
    targetRevision: 1.17.3
    helm:
      valuesObject:
        autoDirectNodeRoutes: true

        bandwidthManager:
          bbr: true
          enabled: true

        bgpControlPlane:
          enabled: true

        bpf:
          datapathMode: netkit
          distributedLRU:
            enabled: false
          mapDynamicSizeRatio: 0.08
          masquerade: true
          preallocateMaps: true

        bpfClockProbe: true

        cgroup:
          autoMount:
            enabled: false
          hostRoot: /sys/fs/cgroup

        dashboards:
          annotations:
            grafana_folder: Cilium
          enabled: true

        devices: ens18

        enableIPv4BIGTCP: true

        endpointRoutes:
          enabled: true

        envoy:
          enabled: true
          rollOutPods: true

        gatewayAPI:
          enableAlpn: true
          enableAppProtocol: true
          enabled: true

        hubble:
          enabled: true
          relay:
            enabled: true
          ui:
            enabled: true

        ingressController:
          default: true
          enabled: true
          loadbalancerMode: dedicated

        ipam:
          mode: kubernetes

        ipv4NativeRoutingCIDR: 10.244.0.0/16

        k8sServiceHost: localhost
        k8sServicePort: 7445

        kubeProxyReplacement: true

        loadBalancer:
          algorithm: maglev
          mode: dsr

        localRedirectPolicy: true

        operator:
          dashboards:
            annotations:
              grafana_folder: Cilium
            enabled: true
          prometheus:
            enabled: true
            serviceMonitor:
              enabled: true
          replicas: 2
          rollOutPods: true

        prometheus:
          enabled: true
          serviceMonitor:
            enabled: true
            trustCRDsExist: true

        rollOutCiliumPods: true

        routingMode: native

        securityContext:
          capabilities:
            ciliumAgent:
              - CHOWN
              - KILL
              - NET_ADMIN
              - NET_RAW
              - IPC_LOCK
              - SYS_ADMIN
              - SYS_RESOURCE
              - DAC_OVERRIDE
              - PERFMON
              - BPF
              - FOWNER
              - SETGID
              - SETUID
            cleanCiliumState:
              - NET_ADMIN
              - SYS_ADMIN
              - SYS_RESOURCE

---
# Cilium supplementary configs — BGP, Gateways, LB IP Pool
# These require Cilium CRDs (installed by the Helm chart above), hence the later sync wave.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-configs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: network
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      selfHeal: true
      prune: true

  source:
    repoURL: https://github.com/mpeterson/homelab
    path: kubernetes/infra/cilium/
    targetRevision: main
