---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  info:
    - name: Chart
      # renovate: datasource=helm registryUrl=https://helm.cilium.io depName=cilium
      value: cilium@1.18.7

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      selfHeal: true
      prune: false

  # Cilium's Helm template renders nodePort as empty on cilium-ingress Service
  # ports, letting Kubernetes auto-assign values. This creates a perpetual diff
  # between the rendered (empty) and live (assigned) state.
  ignoreDifferences:
    - group: ""
      kind: Service
      name: cilium-ingress
      jqPathExpressions:
        - .spec.ports[]?.nodePort

  source:
    repoURL: https://github.com/mpeterson/homelab
    path: kubernetes/infra/cilium/
    targetRevision: main
