    repo: oci://ghcr.io/home-operations/charts
    # renovate: datasource=docker depName=ghcr.io/home-operations/charts/tuppr
    version: 0.1.3
    releaseName: tuppr
    namespace: *ns
    valuesFile: values.yaml
