---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: iscsi-health-check
spec:
  selector:
    matchLabels:
      app: iscsi-health-check
  template:
    metadata:
      labels:
        app: iscsi-health-check
    spec:
      # No CP toleration — iSCSI CSI driver only runs on worker nodes
      containers:
        - name: probe
          image: busybox:latest@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
          command:
            - sh
            - -c
            - |
              while true; do
                date > /data/health && cat /data/health > /dev/null
                sleep 30
              done
          readinessProbe:
            exec:
              command: ["sh", "-c", "cat /data/health"]
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              memory: 16Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                storageClassName: zfs-generic-iscsi-csi-xfs
                resources:
                  requests:
                    storage: 512Mi
