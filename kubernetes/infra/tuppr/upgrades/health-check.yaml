---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: iscsi-health-check
spec:
  selector:
    matchLabels:
      app: iscsi-health-check
  template:
    metadata:
      labels:
        app: iscsi-health-check
    spec:
      # No CP toleration — iSCSI CSI driver only runs on worker nodes
      containers:
        - name: probe
          image: busybox:1.37.0@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
          command:
            - sh
            - -c
            - |
              while true; do
                date > /data/health && cat /data/health > /dev/null
                sleep 30
              done
          readinessProbe:
            exec:
              command: ["sh", "-c", "cat /data/health"]
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              memory: 16Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          ephemeral:
            volumeClaimTemplate:
              metadata:
                labels:
                  velero.io/exclude-from-backup: "true"
              spec:
                accessModes: [ReadWriteOnce]
                storageClassName: zfs-generic-iscsi-csi-xfs
                resources:
                  requests:
                    storage: 512Mi
