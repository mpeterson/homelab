# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-3.7.3/charts/library/common/values.schema.json
---
controllers:
  alertmanager:
    type: statefulset
    annotations:
      reloader.stakater.com/auto: "true"

    statefulset:
      volumeClaimTemplates:
        - name: storage
          accessMode: ReadWriteOnce
          size: 300Mi
          storageClass: zfs-generic-iscsi-csi-xfs
          globalMounts:
            - path: /alertmanager

    containers:
      alertmanager:
        image:
          repository: quay.io/prometheus/alertmanager
          tag: v0.31.1@sha256:88b605de9aba0410775c1eb3438f951115054e0d307f23f274a4c705f51630c1
        args:
          - --config.file=/etc/alertmanager/alertmanager.yml
          - --storage.path=/alertmanager
          - --web.external-url=https://alertmanager.lan.peterson.com.ar
        ports:
          - name: http
            containerPort: 9093
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              periodSeconds: 5
        resources:
          requests:
            cpu: 11m
            memory: 50M
          limits:
            memory: 99M

service:
  app:
    controller: alertmanager
    ports:
      http:
        port: &port 9093

persistence:
  config:
    type: configMap
    name: alertmanager
    globalMounts:
      - path: /etc/alertmanager
  secrets:
    type: secret
    name: alertmanager
    globalMounts:
      - path: /etc/secrets

route:
  app:
    hostnames:
      - alertmanager.lan.peterson.com.ar
    parentRefs:
      - name: internal-gateway
        namespace: network
        sectionName: https
    rules:
      - backendRefs:
          - name: alertmanager
            port: *port
