---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: &app kromgo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  info:
    - name: Chart
      # renovate: datasource=helm registryUrl=https://bjw-s-labs.github.io/helm-charts depName=app-template
      value: app-template@4.6.2
    - name: Image
      # renovate: datasource=docker depName=ghcr.io/kashalls/kromgo
      value: ghcr.io/kashalls/kromgo:v0.9.0@sha256:50b1477c479d0eec59aa008ec9ca7ad28595ec1e6cc3fb4a31643209e0ec0f85

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      selfHeal: true
      prune: true

  source:
    repoURL: https://github.com/mpeterson/homelab
    path: kubernetes/infra/kromgo/
    targetRevision: main
