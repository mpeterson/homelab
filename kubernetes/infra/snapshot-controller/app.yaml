---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snapshot-controller
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-6"

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: infra

  info:
    - name: Chart
      # renovate: datasource=helm registryUrl=https://piraeus.io/helm-charts/ depName=snapshot-controller
      value: snapshot-controller@5.0.3

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      selfHeal: true
      prune: true

  source:
    repoURL: https://github.com/mpeterson/homelab
    path: kubernetes/infra/snapshot-controller/
    targetRevision: main
