---
crds:
  enabled: false
cleanPrometheusOperatorObjectNames: true

defaultRules:
  disabled:
    InfoInhibitor: true

###
### Component values
###
alertmanager:
  enabled: true

  route:
    main:
      enabled: true
      hostnames:
        - alertmanager.lan.peterson.com.ar
      parentRefs:
        - name: internal-gateway
          namespace: network
          sectionName: https

  alertmanagerSpec:
    externalUrl: "https://alertmanager.lan.peterson.com.ar"
    alertmanagerConfigSelector: {}
    alertmanagerConfigNamespaceSelector: {}
    alertmanagerConfigMatcherStrategy:
      type: None
    secrets:
      - alertmanager-secrets
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: zfs-generic-iscsi-csi-xfs
          resources:
            requests:
              storage: 300Mi
    resources:
      requests:
        cpu: 11m
        memory: 50M
      limits:
        memory: 99M

  config:
    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ["alertname", "namespace"]
    route:
      receiver: pushover
      group_by: ["alertname", "job"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 6h
      routes:
        - receiver: healthcheck_canary
          matchers:
            - alertname = "Watchdog"
          repeat_interval: 5m
          group_interval: 1m
        - receiver: pushover
          matchers:
            - severity = critical
          continue: true
    receivers:
      - name: "null"
      - name: healthcheck_canary
        webhook_configs:
          - url_file: /etc/alertmanager/secrets/alertmanager-secrets/healthcheck_canary_url
            send_resolved: false
      - name: pushover
        pushover_configs:
          - html: true
            token_file: /etc/alertmanager/secrets/alertmanager-secrets/pushover_api_token
            user_key_file: /etc/alertmanager/secrets/alertmanager-secrets/pushover_api_userkey
            send_resolved: true
            priority: |-
              {{ if eq .Status "firing" }}1{{ else }}0{{ end }}
            url_title: View in Alert Manager
            title: |-
              [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
            message: |-
              {{- range .Alerts }}
                {{- if ne .Labels.severity "" }}
                  <b>Severity:</b> <i>{{ .Labels.severity }}</i>
                {{- else }}
                  <b>Severity:</b> <i>N/A</i>
                {{- end }}
                {{- if ne .Annotations.description "" }}
                  <b>Description:</b> <i>{{ .Annotations.description }}</i>
                {{- else if ne .Annotations.summary "" }}
                  <b>Summary:</b> <i>{{ .Annotations.summary }}</i>
                {{- else if ne .Annotations.message "" }}
                  <b>Message:</b> <i>{{ .Annotations.message }}</i>
                {{- else }}
                  <b>Description:</b> <i>N/A</i>
                {{- end }}
                {{- if gt (len .Labels.SortedPairs) 0 }}
                  <b>Details:</b>
                  {{- range .Labels.SortedPairs }}
                    • <b>{{ .Name }}:</b> <i>{{ .Value }}</i>
                  {{- end }}
                {{- end }}
              {{- end }}

kubeApiServer:
  enabled: true
  serviceMonitor:
    metricRelabelings:
      # Drop high cardinality labels
      - action: drop
        sourceLabels: ["__name__"]
        regex: (apiserver|etcd|rest_client)_request(|_sli|_slo)_duration_seconds_bucket
      - action: drop
        sourceLabels: ["__name__"]
        regex: (apiserver_response_sizes_bucket|apiserver_watch_events_sizes_bucket)

kubeControllerManager:
  enabled: false

kubeEtcd:
  enabled: false

kubelet:
  enabled: true
  serviceMonitor:
    metricRelabelings:
      # Drop high cardinality labels
      - action: labeldrop
        regex: (uid)
      - action: labeldrop
        regex: (id|name)
      - action: drop
        sourceLabels: ["__name__"]
        regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)

kubeProxy:
  enabled: false

kubeScheduler:
  enabled: false

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

grafana:
  enabled: false
  forceDeployDashboards: true
  sidecar:
    dashboards:
      annotations:
        grafana_folder: Kubernetes

###
### Prometheus operator values
###
prometheusOperator:
  resources:
    requests:
      cpu: 35m
      memory: 273M
    limits:
      memory: 326M

  prometheusConfigReloader:
    # resource config for prometheusConfigReloader
    resources:
      requests:
        cpu: 5m
        memory: 32M
      limits:
        memory: 32M

###
### Prometheus instance values
###
prometheus:
  prometheusSpec:
    enableAdminAPI: true
    enableFeatures:
      - auto-gomaxprocs
      - memory-snapshot-on-shutdown
      - new-service-discovery-manager
    externalUrl: "https://prometheus.lan.peterson.com.ar"
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    replicas: 1
    replicaExternalLabelName: "__replica__"  # must match with thanos value `.query.replicaLabel[0]`
    resources:
      requests:
        cpu: 100m
        memory: 512M
      limits:
        memory: 2000M
    retention: 14d
    retentionSize: 50GB
    ruleSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    scrapeInterval: 1m  # Must match interval in Grafana Helm chart
    serviceMonitorSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: zfs-generic-iscsi-csi-xfs
          resources:
            requests:
              storage: 55Gi
    walCompression: true

  route:
    main:
      enabled: true
      hostnames:
        - prometheus.lan.peterson.com.ar
      parentRefs:
        - name: internal-gateway
          namespace: network
          sectionName: https
