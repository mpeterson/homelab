---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  route:
    receiver: pushover
    groupBy:
      - alertname
      - job
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 6h
    routes:
      - receiver: healthcheck-canary
        matchers:
          - name: alertname
            matchType: "="
            value: Watchdog
        repeatInterval: 5m
        groupInterval: 1m
      - receiver: pushover
        matchers:
          - name: severity
            matchType: "="
            value: critical
        continue: true

  inhibitRules:
    - equal:
        - alertname
        - namespace
      sourceMatch:
        - name: severity
          matchType: "="
          value: critical
      targetMatch:
        - name: severity
          matchType: "="
          value: warning

  receivers:
    - name: "null"
    - name: healthcheck-canary
      webhookConfigs:
        - urlSecret:
            name: alertmanager-secrets
            key: healthcheck_canary_url
          sendResolved: false
    - name: pushover
      pushoverConfigs:
        - html: true
          monospace: false
          token:
            name: alertmanager-secrets
            key: pushover_api_token
          userKey:
            name: alertmanager-secrets
            key: pushover_api_userkey
          sendResolved: true
          sound: gamelan
          ttl: 86400s
          priority: '{{ if eq .Status "firing" }}1{{ else }}0{{ end }}'
          urlTitle: View in Alert Manager
          title: >-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
          message: |-
            {{- range .Alerts }}
              {{- if ne .Annotations.description "" }}
                {{ .Annotations.description }}
              {{- else if ne .Annotations.summary "" }}
                {{ .Annotations.summary }}
              {{- else if ne .Annotations.message "" }}
                {{ .Annotations.message }}
              {{- else }}
                Alert description not available
              {{- end }}
              {{- if gt (len .Labels.SortedPairs) 0 }}
                <small>
                  {{- range .Labels.SortedPairs }}
                    <b>{{ .Name }}:</b> {{ .Value }}
                  {{- end }}
                </small>
              {{- end }}
            {{- end }}
