---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: main
  namespace: monitoring
spec:
  receivers:
    - name: "null"
    - name: healthcheck-canary
      webhookConfigs:
        - urlSecret:
            name: alertmanager-secrets
            key: healthcheck_canary_url
          sendResolved: false
    - name: pushover
      pushoverConfigs:
        - token:
            name: alertmanager-secrets
            key: pushover_api_token
          userKey:
            name: alertmanager-secrets
            key: pushover_api_userkey
          sendResolved: true
          html: true
          priority: '{{ if eq .Status "firing" }}1{{ else }}0{{ end }}'
          urlTitle: View in Alert Manager
          title: >-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
          message: |-
            {{- range .Alerts }}
              {{- if ne .Labels.severity "" }}
                <b>Severity:</b> <i>{{ .Labels.severity }}</i>
              {{- else }}
                <b>Severity:</b> <i>N/A</i>
              {{- end }}
              {{- if ne .Annotations.description "" }}
                <b>Description:</b> <i>{{ .Annotations.description }}</i>
              {{- else if ne .Annotations.summary "" }}
                <b>Summary:</b> <i>{{ .Annotations.summary }}</i>
              {{- else if ne .Annotations.message "" }}
                <b>Message:</b> <i>{{ .Annotations.message }}</i>
              {{- else }}
                <b>Description:</b> <i>N/A</i>
              {{- end }}
              {{- if gt (len .Labels.SortedPairs) 0 }}
                <b>Details:</b>
                {{- range .Labels.SortedPairs }}
                  • <b>{{ .Name }}:</b> <i>{{ .Value }}</i>
                {{- end }}
              {{- end }}
            {{- end }}
  route:
    receiver: pushover
    groupBy:
      - alertname
      - job
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 6h
    routes:
      - receiver: "null"
        matchers:
          - name: alertname
            matchType: "="
            value: CPUThrottlingHigh
          - name: container
            matchType: "="
            value: cert-approver
      - receiver: healthcheck-canary
        matchers:
          - name: alertname
            matchType: "="
            value: Watchdog
        repeatInterval: 5m
        groupInterval: 1m
      - receiver: pushover
        matchers:
          - name: severity
            matchType: "="
            value: critical
        continue: true
