---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: &app velero
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: velero

  info:
    - name: Chart
      # renovate: datasource=helm registryUrl=https://vmware-tanzu.github.io/helm-charts depName=velero
      value: velero@12.0.1

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    automated:
      selfHeal: true
      prune: true

  source:
    repoURL: https://github.com/mpeterson/homelab
    path: kubernetes/infra/velero/
    targetRevision: main
