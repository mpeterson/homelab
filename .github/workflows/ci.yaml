---
name: CI

on:
  pull_request:
    branches: [main]

  workflow_dispatch:

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82  # v7

      - name: Run yamllint
        run: uvx yamllint --strict --format github -c .yamllint.yaml .
