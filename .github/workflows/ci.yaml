---
name: CI

on:
  pull_request:
    branches: [main]

  workflow_dispatch:

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7

      - name: Run yamllint
        run: uvx yamllint --strict --format github -c .yamllint.yaml .

  jsonlint:
    name: JSON Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Validate JSON/JSON5 files
        run: |
          status=0
          while IFS= read -r file; do
            if ! npx --yes json5 -v "$file" > /dev/null 2>&1; then
              echo "::error file=${file}::Invalid JSON/JSON5"
              status=1
            fi
          done < <(find . \( -name '*.json' -o -name '*.json5' \) -not -path './.git/*')
          exit "$status"

  actionlint:
    name: Action Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run actionlint
        uses: reviewdog/action-actionlint@05c9d7bef25a46caf572b3bd62ae4d8ed5bb3aab  # v1

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@db43aef879112c3119571b0a020a13571e8c2703  # v19
