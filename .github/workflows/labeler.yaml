---
name: Labeler

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Labeler
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b  # v6
        with:
          sync-labels: true
