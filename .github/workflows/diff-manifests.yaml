---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: ArgoCD Diff Preview

on:
  pull_request:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  filter-changes:
    name: Filter changes
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get changed files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@015416e33c709af88f84a4496f4030c1f0ef212e # v0.5.0
        with:
          patterns: |-
            kubernetes/**/*

  diff:
    if: ${{ needs.filter-changes.outputs.changed-files != '[]' }}
    name: Rendered Manifest Diff
    runs-on: ubuntu-latest
    needs:
      - filter-changes
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Generate diff
        id: diff
        env:
          TARGET_BRANCH: ${{ github.head_ref }}
          REPO: ${{ github.repository }}
        run: |
          just argocd diff "origin/${{ github.base_ref }}"
          DIFF_FILE=$(find .local/argocd-diff -name 'diff.md' -type f 2>/dev/null | sort | tail -1)
          if [ -n "$DIFF_FILE" ]; then
            echo "diff_file=$DIFF_FILE" >> "$GITHUB_OUTPUT"
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post diff as PR comment
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.number }} \
            --repo ${{ github.repository }} \
            --body-file "${{ steps.diff.outputs.diff_file }}" \
            --edit-last 2>/dev/null || \
          gh pr comment ${{ github.event.number }} \
            --repo ${{ github.repository }} \
            --body-file "${{ steps.diff.outputs.diff_file }}"
