---
name: Lint

on:
  pull_request:
    branches: [main]

  workflow_dispatch:

jobs:
  yamllint:
    name: YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@015416e33c709af88f84a4496f4030c1f0ef212e  # v0.5.0
        with:
          patterns: |-
            **/*.yaml
            **/*.yml

      - name: Setup uv
        if: steps.changed-files.outputs.changed_files != '[]'
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7

      - name: Run yamllint
        if: steps.changed-files.outputs.changed_files != '[]'
        run: uvx yamllint --strict --format github -c .yamllint.yaml .

  jsonlint:
    name: JSON
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@015416e33c709af88f84a4496f4030c1f0ef212e  # v0.5.0
        with:
          patterns: |-
            **/*.json
            **/*.json5

      - name: Validate JSON/JSON5 files
        if: steps.changed-files.outputs.changed_files != '[]'
        run: |
          status=0
          while IFS= read -r file; do
            if ! npx --yes json5 -v "$file" > /dev/null 2>&1; then
              echo "::error file=${file}::Invalid JSON/JSON5"
              status=1
            fi
          done < <(find . \( -name '*.json' -o -name '*.json5' \) -not -path './.git/*')
          exit "$status"

  actionlint:
    name: Actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@015416e33c709af88f84a4496f4030c1f0ef212e  # v0.5.0
        with:
          patterns: |-
            .github/workflows/*.yaml
            .github/workflows/*.yml

      - name: Install actionlint
        if: steps.changed-files.outputs.changed_files != '[]'
        run: bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Run actionlint
        if: steps.changed-files.outputs.changed_files != '[]'
        run: ./actionlint -color

  markdownlint:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@015416e33c709af88f84a4496f4030c1f0ef212e  # v0.5.0
        with:
          patterns: |-
            **/*.md

      - name: Run markdownlint
        if: steps.changed-files.outputs.changed_files != '[]'
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9  # v23.0.0

  lint-success:
    name: All linters passed
    if: ${{ !cancelled() }}
    needs: [yamllint, jsonlint, actionlint, markdownlint]
    runs-on: ubuntu-latest
    steps:
      - name: Check lint results
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          echo "::error::One or more lint jobs failed"
          exit 1
