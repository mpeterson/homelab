---
name: Lint

on:
  pull_request:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter-changes:
    name: Filter changes
    runs-on: ubuntu-latest
    outputs:
      yaml-changed: ${{ steps.yaml.outputs.changed_files }}
      json-changed: ${{ steps.json.outputs.changed_files }}
      actions-changed: ${{ steps.actions.outputs.changed_files }}
      markdown-changed: ${{ steps.markdown.outputs.changed_files }}
    steps:
      - name: YAML changes
        id: yaml
        uses: bjw-s-labs/action-changed-files@015416e33c709af88f84a4496f4030c1f0ef212e # v0.5.0
        with:
          patterns: |-
            **/*.yaml
            **/*.yml
      - name: JSON changes
        id: json
        uses: bjw-s-labs/action-changed-files@015416e33c709af88f84a4496f4030c1f0ef212e # v0.5.0
        with:
          patterns: |-
            **/*.json
            **/*.json5
      - name: Actions changes
        id: actions
        uses: bjw-s-labs/action-changed-files@015416e33c709af88f84a4496f4030c1f0ef212e # v0.5.0
        with:
          patterns: |-
            .github/workflows/*.yaml
            .github/workflows/*.yml
      - name: Markdown changes
        id: markdown
        uses: bjw-s-labs/action-changed-files@015416e33c709af88f84a4496f4030c1f0ef212e # v0.5.0
        with:
          patterns: |-
            **/*.md

  yamllint:
    if: ${{ needs.filter-changes.outputs.yaml-changed != '[]' }}
    name: YAML
    runs-on: ubuntu-latest
    needs:
      - filter-changes
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Lint
        run: just lint yaml

  jsonlint:
    if: ${{ needs.filter-changes.outputs.json-changed != '[]' }}
    name: JSON
    runs-on: ubuntu-latest
    needs:
      - filter-changes
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Lint
        run: just lint json

  actionlint:
    if: ${{ needs.filter-changes.outputs.actions-changed != '[]' }}
    name: Actions
    runs-on: ubuntu-latest
    needs:
      - filter-changes
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Lint
        run: just lint actions

  markdownlint:
    if: ${{ needs.filter-changes.outputs.markdown-changed != '[]' }}
    name: Markdown
    runs-on: ubuntu-latest
    needs:
      - filter-changes
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Lint
        run: just lint markdown

  renovatelint:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - name: Lint
        run: just lint renovate

  lint-success:
    name: All linters passed
    if: ${{ !cancelled() }}
    needs: [yamllint, jsonlint, actionlint, markdownlint, renovatelint]
    runs-on: ubuntu-latest
    steps:
      - name: Check lint results
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          echo "::error::One or more lint jobs failed"
          exit 1
