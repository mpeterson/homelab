---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Validate Manifests

on:
  pull_request:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter-changes:
    name: Filter changes
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get changed files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@015416e33c709af88f84a4496f4030c1f0ef212e # v0.5.0
        with:
          patterns: |-
            kubernetes/**/*

  kustomize:
    if: ${{ needs.filter-changes.outputs.changed-files != '[]' }}
    name: Kustomize Build
    runs-on: ubuntu-latest
    needs:
      - filter-changes
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Validate
        run: just validate kustomize

  helm:
    if: ${{ needs.filter-changes.outputs.changed-files != '[]' }}
    name: Helm Template
    runs-on: ubuntu-latest
    needs:
      - filter-changes
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Validate
        run: just validate helm

  images:
    if: ${{ needs.filter-changes.outputs.changed-files != '[]' }}
    name: Verify Images
    runs-on: ubuntu-latest
    needs:
      - filter-changes
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Validate
        run: just validate images

  validate-success:
    name: All validations passed
    if: ${{ !cancelled() }}
    needs: [kustomize, helm, images]
    runs-on: ubuntu-latest
    steps:
      - name: Check validation results
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          echo "::error::One or more validation jobs failed"
          exit 1
