---
# Rule config is inherited from .markdownlint.yaml
# This file adds ignore patterns for upstream/generated files

ignores:
  # Squad upstream templates — not maintained in this repo
  - ".squad/templates/**/*.md"
  # Copilot skills — generated by Squad framework
  - ".copilot/skills/**/*.md"
  # GitHub agents — generated config
  - ".github/agents/**/*.md"
