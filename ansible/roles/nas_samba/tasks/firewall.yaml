---
- name: Open SMB port (445/tcp) in firewalld
  ansible.posix.firewalld:
    port: 445/tcp
    permanent: true
    immediate: true
    state: enabled
  become: "{{ nas_samba_pcs_become }}"

- name: Reload firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: reloaded
  become: "{{ nas_samba_pcs_become }}"
