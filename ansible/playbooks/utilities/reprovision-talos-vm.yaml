---
# Ansible playbook to reprovision Talos VMs in a Proxmox cluster
# This playbook will:
# 1. Resolve VM names to IDs using qm list
# 2. Stop the VMs
# 3. Delete their disks
# 4. Recreate the disks
# 5. Optionally convert to UEFI/Q35
# 6. Optionally attach an ISO
# 7. Set boot order
# 8. Start the VMs
#
# Usage examples:
#   Reprovision a single VM:
#     ansible-playbook reprovision-talos-vm.yaml -e "target_vms=['talos-03']"
#
#   Reprovision with UEFI conversion:
#     ansible-playbook reprovision-talos-vm.yaml -e "target_vms=['talos-03']" -e "convert_uefi=true"
#
#   Reprovision with ISO attachment:
#     ansible-playbook reprovision-talos-vm.yaml -e "target_vms=['talos-03']" -e "iso_file=talos-v1.7.0-metal-amd64.iso"
#
#   Dry-run mode:
#     ansible-playbook reprovision-talos-vm.yaml -e "target_vms=['talos-03']" -e "dry_run=true"

- name: Reprovision Talos VMs in Proxmox Cluster
  hosts: pve
  gather_facts: false
  vars:
    target_vms: []  # Required — pass via -e '{"target_vms":["talos-03"]}'
    disk_size: "100"  # in GB
    storage: "workloads"
    disk_options: "iothread=1"
    convert_uefi: true  # Set to false to skip UEFI/Q35 conversion
    iso_file: ""  # ISO filename to attach (e.g. talos-v1.12.5-standard.iso)
    iso_url: ""  # URL to download ISO from (e.g. https://factory.talos.dev/image/...)
    iso_storage: "local"  # Storage for ISO files (typically 'local')
    dry_run: false  # Set to true for dry-run mode

  tasks:
    - name: Fail if no target VMs specified
      ansible.builtin.fail:
        msg: "No target VMs specified. Pass via -e '{\"target_vms\":[\"talos-03\"]}'"
      when: target_vms | length == 0
      run_once: true

    - name: Notify about dry-run mode
      ansible.builtin.debug:
        msg: "Running in DRY-RUN mode. No changes will be made to the VMs."
      when: dry_run | bool
      run_once: true

    - name: Ensure ISO is available on Proxmox nodes
      when:
        - iso_url | default('', true) | length > 0
        - iso_file | default('', true) | length > 0
      block:
        - name: Check for existing ISO
          ansible.builtin.command:
            cmd: >-
              pvesh get /nodes/{{ inventory_hostname | regex_replace('\..*$', '') }}/storage/{{ iso_storage }}/content
              --content iso
              --output-format json
          changed_when: false
          register: existing_isos

        - name: Download ISO if missing
          ansible.builtin.command: >-
            pvesh create /nodes/{{ inventory_hostname | regex_replace('\..*$', '') }}/storage/{{ iso_storage }}/download-url
            --content iso
            --filename {{ iso_file }}
            --url {{ iso_url }}
          when: iso_file not in (existing_isos.stdout | from_json | json_query('[].volid') | map('basename'))
          changed_when: true

    - name: Display configuration
      ansible.builtin.debug:
        msg: |
          Reprovision configuration:
            Target VMs: {{ target_vms | join(', ') }}
            Storage: {{ storage }}
            Disk size: {{ disk_size }}GB
            Disk options: {{ disk_options }}
            UEFI conversion: {{ convert_uefi | bool }}
            ISO file: {{ iso_file | default('none', true) }}
      run_once: true

    - name: Show warning and get confirmation
      ansible.builtin.pause:
        prompt: "WARNING: This will reprovision Talos VMs ({{ target_vms | join(', ') }}). All data will be lost! Press Enter to continue or Ctrl+C to abort"
      delegate_to: localhost
      run_once: true
      when: not dry_run | bool

    - name: Resolve VM names to IDs
      ansible.builtin.shell:
        cmd: "qm list 2>/dev/null | awk '$2 == \"{{ item }}\" { print $1 }'"
      register: vm_resolve_results
      with_items: "{{ target_vms }}"
      changed_when: false
      failed_when: false

    - name: Build resolved VMs list
      ansible.builtin.set_fact:
        resolved_vms: "{{ resolved_vms | default([]) + [{'name': item.item, 'id': item.stdout | trim}] }}"
      when: item.stdout is defined and item.stdout | trim | length > 0
      with_items: "{{ vm_resolve_results.results }}"

    - name: Check status for resolved VMs
      ansible.builtin.shell:
        cmd: "qm status {{ item.id }} 2>/dev/null || echo 'not_found'"
      register: vm_status_check
      with_items: "{{ resolved_vms | default([]) }}"
      when: resolved_vms is defined and resolved_vms | length > 0
      changed_when: false
      failed_when: false

    - name: Build found VMs list
      ansible.builtin.set_fact:
        found_vms: "{{ found_vms | default([]) + [{'name': item.item.name, 'id': item.item.id, 'status': item.stdout}] }}"
      when: item.stdout is defined and item.stdout != "not_found" and item.stdout | trim | length > 0
      with_items: "{{ vm_status_check.results | default([]) }}"

    - name: Display found VMs on this node
      ansible.builtin.debug:
        msg: "Found VMs on {{ inventory_hostname }}: {{ found_vms | map(attribute='name') | list }} (IDs: {{ found_vms | map(attribute='id') | list }})"
      when: found_vms is defined and found_vms | length > 0

    - name: Warn about VMs not found on this node
      ansible.builtin.debug:
        msg: "No target VMs found on {{ inventory_hostname }}"
      when: found_vms is not defined or found_vms | length == 0

    - name: Get disk configuration for each VM
      ansible.builtin.shell:
        cmd: "qm config {{ item.id }} | grep scsi0 || echo 'no_disk'"
      register: disk_configs
      with_items: "{{ found_vms | default([]) }}"
      when: found_vms is defined and found_vms | length > 0
      changed_when: false

    - name: Process each VM (DRY-RUN mode)
      block:
        - name: Display operations that would be performed
          ansible.builtin.debug:
            msg: |
              [DRY-RUN] Would perform the following operations on {{ inventory_hostname }}:
              {% for vm in found_vms %}
              -- VM {{ vm.name }} (ID: {{ vm.id }}) --
              {% if 'running' in vm.status %}
                - Stop VM {{ vm.id }}
                - Wait for VM to stop
              {% endif %}
              {% for disk in disk_configs.results %}
              {% if disk.item.id == vm.id and disk.stdout != 'no_disk' and 'scsi0:' in disk.stdout %}
                - Detach disk: {{ disk.stdout | trim }}
                - Delete unused disk
                - Wait for disk deletion
              {% endif %}
              {% endfor %}
                - Create new disk: {{ storage }}:{{ disk_size }},{{ disk_options }}
                - Wait for disk creation
              {% if convert_uefi | bool %}
                - Set BIOS to OVMF (UEFI)
                - Set machine type to Q35
                - Create EFI disk: {{ storage }}:1,efitype=4m,pre-enrolled-keys=0
              {% endif %}
              {% if iso_file | default('', true) | length > 0 %}
                - Attach ISO: {{ iso_storage }}:iso/{{ iso_file }},media=cdrom
              {% endif %}
                - Set boot order: scsi0;ide2;net0
                - Start VM {{ vm.id }}
              {% endfor %}
      when:
        - found_vms is defined and found_vms | length > 0
        - dry_run | bool

    - name: Process each VM (REAL mode)
      block:
        - name: Stop running VMs
          ansible.builtin.command:
            cmd: "qm stop {{ item.id }}"
          register: stop_result
          with_items: "{{ found_vms }}"
          when: "'running' in item.status"
          changed_when: stop_result.rc == 0

        - name: Wait for VMs to stop
          ansible.builtin.shell:
            cmd: "qm status {{ item.id }} | grep -q 'status: stopped'"
          register: vm_stopped
          retries: 30
          delay: 2
          until: vm_stopped.rc == 0
          with_items: "{{ found_vms }}"
          when: "'running' in item.status"
          changed_when: false

        - name: Detach VM disks
          ansible.builtin.command:
            cmd: "qm set {{ item.item.id }} --delete scsi0"
          register: detach_result
          with_items: "{{ disk_configs.results }}"
          when: item is defined and item.stdout is defined and item.stdout != "no_disk" and "scsi0:" in item.stdout
          changed_when: detach_result.rc == 0

        - name: Wait for disk detach to complete
          ansible.builtin.shell:
            cmd: "qm config {{ item.item.id }} | grep -q 'scsi0:'"
          register: disk_detached
          retries: 30
          delay: 2
          until: disk_detached.rc != 0
          failed_when: disk_detached.rc == 0
          with_items: "{{ disk_configs.results }}"
          when: item is defined and item.stdout is defined and item.stdout != "no_disk" and "scsi0:" in item.stdout
          changed_when: false

        - name: Delete VM disks
          ansible.builtin.command:
            cmd: "qm set {{ item.item.id }} --delete unused0"
          register: delete_result
          with_items: "{{ disk_configs.results }}"
          when: item is defined and item.stdout is defined and item.stdout != "no_disk" and "scsi0:" in item.stdout
          changed_when: delete_result.rc == 0

        - name: Create new disks
          ansible.builtin.command:
            cmd: "qm set {{ item.id }} --scsi0 {{ storage }}:{{ disk_size }},{{ disk_options }}"
          register: create_result
          with_items: "{{ found_vms }}"
          changed_when: create_result.rc == 0

        - name: Wait for disk creation to complete
          ansible.builtin.shell:
            cmd: "qm config {{ item.id }} | grep -q 'scsi0:'"
          register: disk_created
          retries: 30
          delay: 2
          until: disk_created.rc == 0
          with_items: "{{ found_vms }}"
          changed_when: false

        - name: Set BIOS to OVMF (UEFI)
          ansible.builtin.command:
            cmd: "qm set {{ item.id }} --bios ovmf"
          register: bios_result
          with_items: "{{ found_vms }}"
          when: convert_uefi | bool
          changed_when: bios_result.rc == 0

        - name: Set machine type to Q35
          ansible.builtin.command:
            cmd: "qm set {{ item.id }} --machine q35"
          register: machine_result
          with_items: "{{ found_vms }}"
          when: convert_uefi | bool
          changed_when: machine_result.rc == 0

        - name: Create EFI disk
          ansible.builtin.command:
            cmd: "qm set {{ item.id }} --efidisk0 {{ storage }}:1,efitype=4m,pre-enrolled-keys=0"
          register: efidisk_result
          with_items: "{{ found_vms }}"
          when: convert_uefi | bool
          changed_when: efidisk_result.rc == 0

        - name: Attach ISO
          ansible.builtin.command:
            cmd: "qm set {{ item.id }} --ide2 {{ iso_storage }}:iso/{{ iso_file }},media=cdrom"
          register: iso_result
          with_items: "{{ found_vms }}"
          when: iso_file | default('', true) | length > 0
          changed_when: iso_result.rc == 0

        - name: Set boot order
          ansible.builtin.command:
            cmd: "qm set {{ item.id }} -boot order='scsi0;ide2;net0'"
          register: bootorder_result
          with_items: "{{ found_vms }}"
          changed_when: bootorder_result.rc == 0

        - name: Start VMs
          ansible.builtin.command:
            cmd: "qm start {{ item.id }}"
          register: start_result
          with_items: "{{ found_vms }}"
          changed_when: start_result.rc == 0

      when:
        - found_vms is defined and found_vms | length > 0
        - not dry_run | bool

    - name: Summary for dry-run
      ansible.builtin.debug:
        msg: "[DRY-RUN] Reprovision would have been performed for VMs: {{ found_vms | map(attribute='name') | list }} (IDs: {{ found_vms | map(attribute='id') | list }}) on {{ inventory_hostname }}"
      when:
        - found_vms is defined and found_vms | length > 0
        - dry_run | bool

    - name: Summary for real run
      ansible.builtin.debug:
        msg: "Reprovision completed for VMs: {{ found_vms | map(attribute='name') | list }} (IDs: {{ found_vms | map(attribute='id') | list }}) on {{ inventory_hostname }}"
      when:
        - found_vms is defined and found_vms | length > 0
        - not dry_run | bool
