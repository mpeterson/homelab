---
doublestar: true
formatter:
  type: basic
  drop_merge_tag: true
  eof_newline: true
  include_document_start: true
  indent: 2
  indentless_arrays: false
  line_ending: lf
  retain_line_breaks_single: true
  scan_folded_as_literal: true
  trim_trailing_whitespace: true
exclude:
  # SOPS-encrypted files
  - "**/*.sops.yaml"
  - "**/*.sops.yml"
  # Git submodule
  - "ansible/roles/bind9/**"
